cubes:
  - name: orders
    sql_table: AXLERO_DEV.STAGING.STG_SUPERSTORE_ORDERS_CLEANED

    measures:
      - name: count
        type: count

      - name: total_sales
        sql: SALES
        type: sum

      - name: total_profit
        sql: PROFIT
        type: sum

      - name: total_quantity
        sql: QUANTITY
        type: sum

      - name: average_order_value
        sql: "1.0 * {total_sales} / NULLIF({count}, 0)"
        type: number
        format: currency

      - name: total_cost
        sql: SUM(SALES) - SUM(PROFIT)
        type: number
        format: currency

      - name: profit_margin
        sql: "1.0 * {total_profit} / NULLIF({total_sales}, 0)"
        type: number
        format: percent
  
 
    dimensions:
      - name: order_id
        sql: ORDER_ID
        type: string

      - name: customer_name
        sql: CUSTOMER_NAME
        type: string

      - name: product_name
        sql: PRODUCT_NAME
        type: string

      - name: category
        sql: CATEGORY
        type: string

      - name: region
        sql: REGION
        type: string

      - name: country
        sql: COUNTRY
        type: string

      - name: order_date
        sql: ORDER_DATE
        type: time